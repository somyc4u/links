<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אוצרות מהרשת - המבצעים</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #1a1a1a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--gold); margin-bottom: 20px; }
        
        #searchBar { width: 90%; max-width: 400px; padding: 12px; border-radius: 25px; border: 1px solid #333; margin-bottom: 15px; text-align: center; background: #111; color: white; outline: none; }
        
        /* עיצוב קטגוריות */
        .categories { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 25px; max-width: 500px; }
        .cat-btn { background: #222; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .cat-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }

        .container { width: 100%; max-width: 450px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; text-decoration: none; color: white; transition: 0.3s; display: flex; flex-direction: column; position: relative; }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; font-size: 0.9em; font-weight: bold; color: var(--gold); flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        /* סטטוס HOT */
        .hot-tag { position: absolute; top: 5px; right: 5px; background: red; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 10; animation: pulse 1.5s infinite; }
        .card.hot-border { border: 1px solid var(--gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @media (max-width: 350px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>🎁 המבצעים החמים</h1>
    <input type="text" id="searchBar" placeholder="חפש מוצר..." onkeyup="filterItems()">
    
    <div class="categories" id="catMenu">
        <button class="cat-btn active" onclick="filterCat('all', this)">הכל</button>
    </div>

    <div id="dealsContainer" class="container">טוען אוצרות...</div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1GpZ2pGGM6Lb5MpCTXuW4Op2kJK_RkkNMHUUvyN1vyRQ/gviz/tq?tqx=out:csv';
        let allData = [];

        async function loadDeals() {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            const container = document.getElementById('dealsContainer');
            const catMenu = document.getElementById('catMenu');
            const categories = new Set();
            
            allData = rows.map(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 3) {
                    const item = {
                        name: cols[0].replace(/"/g, '').trim(),
                        link: cols[1].replace(/"/g, '').trim(),
                        img: cols[2].replace(/"/g, '').trim(),
                        cat: (cols[3] || 'כללי').replace(/"/g, '').trim(),
                        status: (cols[4] || '').replace(/"/g, '').trim()
                    };
                    if (item.cat) categories.add(item.cat);
                    return item;
                }
            }).filter(Boolean);

            categories.forEach(c => {
                catMenu.innerHTML += `<button class="cat-btn" onclick="filterCat('${c}', this)">${c}</button>`;
            });

            renderItems(allData);
        }

        function renderItems(items) {
            const container = document.getElementById('dealsContainer');
            container.innerHTML = items.map(item => `
                <a href="${item.link}" target="_blank" class="card ${item.status === 'HOT' ? 'hot-border' : ''}" data-cat="${item.cat}" data-name="${item.name.toLowerCase()}">
                    ${item.status === 'HOT' ? '<div class="hot-tag">🔥 HOT</div>' : ''}
                    <img src="${item.img}" alt="${item.name}">
                    <div class="card-info">${item.name}</div>
                </a>
            `).join('');
        }

        function filterItems() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = card.getAttribute('data-name').includes(term) ? 'flex' : 'none';
            });
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (cat === 'all') {
                renderItems(allData);
            } else {
                renderItems(allData.filter(i => i.cat === cat));
            }
        }

        loadDeals();
    </script>
</body>
</html>
