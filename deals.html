<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="עמוד המבצעים הרשמי של אוצרות מהרשת! הדילים הכי שווים מאליאקספרס - גאדג'טים, הלבשה, מוצרים לבית ולרכב. הרשימה מתעדכנת באופן קבוע.">
    <meta name="keywords" content="אוצרות מהרשת, מבצעים, אליאקספרס, דילים, גאדג'טים, מוצרים לבית, אופנה, קופונים, קניות ברשת, מציאות, מומלצים, SomYc">
    <meta name="author" content="SomYc">

    <meta property="og:title" content="אוצרות מהרשת - עמוד המבצעים 🔥">
    <meta property="og:description" content="כנסו לראות את הדילים והגאדג'טים הכי שווים שמצאנו עבורכם באליאקספרס. קליק אחד ואתם בפנים!">
    <meta property="og:image" content="https://somyc4u.github.io/links/banner.jpg">
    <meta property="og:url" content="https://somyc4u.github.io/links/deals.html">
    <meta property="og:type" content="website">

    <title>אוצרות מהרשת - עמוד המבצעים</title>
    
    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #1a1a1a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .header-banner { width: 100%; max-width: 480px; margin: 0 auto; background-color: #000; line-height: 0; }
        .banner-img { width: 100%; height: auto; display: block; }

        .content-container { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }

        #searchBar { width: 90%; max-width: 400px; padding: 12px; border-radius: 25px; border: 1px solid #333; margin-bottom: 15px; text-align: center; background: #111; color: white; outline: none; }

        .categories { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 25px; }
        .cat-btn { background: #222; color: #fff; border: 1px solid #444; padding: 5px 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; }
        .cat-btn.active { background: var(--gold); color: #000; font-weight: bold; border-color: var(--gold); }

        .deals-container { width: 100%; max-width: 450px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; text-decoration: none; color: white; position: relative; display: flex; flex-direction: column; }
        .img-wrapper { position: relative; width: 100%; height: 160px; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .item-number { position: absolute; bottom: 5px; left: 5px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .card-info { padding: 10px; text-align: center; font-weight: bold; color: var(--gold); font-size: 0.9em; flex-grow: 1; display: flex; align-items: center; justify-content: center; }

        .hot-tag { position: absolute; top: 5px; right: 5px; background: red; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 10; }
        .hot-border { border: 1px solid var(--gold); }

        #loadMoreBtn { margin: 30px 0; padding: 12px 30px; background: var(--gold); color: #000; font-weight: bold; border: none; cursor: pointer; display: none; border-radius: 25px; }

        #backToTop { position: fixed; bottom: 20px; right: 20px; background: var(--gold); color: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; border: none; cursor: pointer; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 100; }
        #backToTop.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div class="header-banner">
        <a href="index.html"><img src="banner.png" alt="אוצרות מהרשת" class="banner-img"></a>
    </div>

    <div class="content-container">
        <input type="text" id="searchBar" placeholder="חפש מוצר..." onkeyup="filterItems()">

        <div class="categories" id="catMenu">
            <button class="cat-btn active" onclick="filterCat('all', this)">הכל</button>
        </div>

        <div id="dealsContainer" class="deals-container">טוען מבצעים...</div>

        <button id="loadMoreBtn" onclick="showMore()">הראי לי עוד...</button>
    </div>

    <button id="backToTop" onclick="scrollToTop()">^</button>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/1GpZ2pGGM6Lb5MpCTXuW4Op2kJK_RkkNMHUUvyN1vyRQ/gviz/tq?tqx=out:csv";
        
        let allData = [];
        let filteredData = [];
        let visibleCount = 12;

        async function loadDeals() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const catMenu = document.getElementById('catMenu');
                const categories = new Set();

                let loadedItems = rows.map((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const cat = (cols[3] || '').replace(/"/g, '').trim();
                    if (cat) categories.add(cat);

                    return {
                        id: index + 2,
                        name: (cols[0] || '').replace(/"/g, '').trim(),
                        link: (cols[1] || '').replace(/"/g, '').trim(),
                        img: (cols[2] || '').replace(/"/g, '').trim(),
                        cat: cat,
                        status: (cols[4] || '').replace(/"/g, '').trim()
                    };
                }).filter(Boolean);

                allData = loadedItems.reverse();
                filteredData = [...allData];

                const sortedCats = [...categories].sort();
                
                sortedCats.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'cat-btn';
                    btn.textContent = c;
                    btn.onclick = function() { filterCat(c, this); };
                    catMenu.appendChild(btn);
                });

                renderItems();
            } catch (error) {
                document.getElementById('dealsContainer').innerHTML = '<p>שגיאה בטעינת הנתונים...</p>';
            }
        }

        function renderItems() {
            const container = document.getElementById('dealsContainer');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            const itemsToShow = filteredData.slice(0, visibleCount);

            container.innerHTML = itemsToShow.map(item => 
                `<a href="${item.link}" target="_blank" class="card ${item.status === 'HOT' ? 'hot-border' : ''}">
                    ${item.status === 'HOT' ? '<div class="hot-tag">🔥 HOT</div>' : ''}
                    <div class="img-wrapper">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="item-number">${item.id}</div>
                    </div>
                    <div class="card-info">${item.name}</div>
                </a>`
            ).join('');

            loadMoreBtn.style.display = (visibleCount < filteredData.length) ? 'block' : 'none';
        }

        function showMore() {
            visibleCount += 12;
            renderItems();
        }

        function filterItems() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            filteredData = allData.filter(item => item.name.toLowerCase().includes(term));
            visibleCount = 12;
            renderItems();
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            filteredData = (cat === 'all') ? [...allData] : allData.filter(i => i.cat === cat);
            visibleCount = 12;
            renderItems();
        }

        window.onscroll = function() {
            const btn = document.getElementById('backToTop');
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                btn.classList.add('show');
            } else {
                btn.classList.remove('show');
            }
        };

        function scrollToTop() {
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        loadDeals();
    </script>
</body>
</html>
