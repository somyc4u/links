<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אוצרות מהרשת - המבצעים</title>
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        h1 { color: #FFD700; text-shadow: 1px 1px 5px rgba(255, 215, 0, 0.3); }
        
        #searchBar { 
            width: 90%; 
            max-width: 400px; 
            padding: 12px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            margin-bottom: 25px; 
            text-align: center; 
            background: #111;
            color: white;
            outline: none;
        }
        #searchBar:focus { border-color: #FFD700; }

        .container { 
            width: 100%; 
            max-width: 450px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* שני מוצרים בשורה למראה קומפקטי */
            gap: 15px; 
        }
        
        .card { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            border-radius: 12px; 
            overflow: hidden; 
            text-decoration: none; 
            color: white; 
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
        }
        
        .card img { 
            width: 100%; 
            height: 140px; /* גובה תמונה מוקטן */
            object-fit: cover; 
            border-bottom: 1px solid #333;
        }
        
        .card-info { 
            padding: 10px; 
            text-align: center; 
            font-size: 0.9em;
            font-weight: bold; 
            color: #FFD700; 
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .card:hover { transform: translateY(-5px); border-color: #FFD700; }

        @media (max-width: 350px) {
            .container { grid-template-columns: 1fr; } /* בטלפונים ממש קטנים מוצר אחד בשורה */
        }
    </style>
</head>
<body>
    <h1>🎁 המבצעים החמים</h1>
    <input type="text" id="searchBar" placeholder="חפש מוצר שראית בטיקטוק..." onkeyup="filterDeals()">
    
    <div id="dealsContainer" class="container">
        </div>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1GpZ2pGGM6Lb5MpCTXuW4Op2kJK_RkkNMHUUvyN1vyRQ/gviz/tq?tqx=out:csv';

        async function loadDeals() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const container = document.getElementById('dealsContainer');
                container.innerHTML = '';

                rows.forEach(row => {
                    // ניקוי ופיצול נכון של שורת CSV
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 3) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const link = cols[1].replace(/"/g, '').trim();
                        const img = cols[2].replace(/"/g, '').trim();
                        
                        if (name && link) {
                            container.innerHTML += `
                                <a href="${link}" target="_blank" class="card" data-name="${name.toLowerCase()}">
                                    <img src="${img}" alt="${name}">
                                    <div class="card-info">${name}</div>
                                </a>`;
                        }
                    }
                });
            } catch (error) {
                document.getElementById('dealsContainer').innerHTML = 'שגיאה בטעינת הנתונים...';
            }
        }

        function filterDeals() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                card.style.display = card.getAttribute('data-name').includes(term) ? 'flex' : 'none';
            });
        }

        loadDeals();
    </script>
</body>
</html>
