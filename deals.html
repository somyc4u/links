<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אוצרות מהרשת - המבצעים</title>
    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #1a1a1a; }
        body { background-color: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        h1 { color: var(--gold); margin-bottom: 20px; }
        
        #searchBar { width: 90%; max-width: 400px; padding: 12px; border-radius: 25px; border: 1px solid #333; margin-bottom: 15px; text-align: center; background: #111; color: white; outline: none; }
        
        .categories { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 25px; max-width: 500px; }
        .cat-btn { background: #222; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .cat-btn.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: bold; }

        .container { width: 100%; max-width: 450px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; text-decoration: none; color: white; transition: 0.3s; display: flex; flex-direction: column; position: relative; }
        .img-wrapper { position: relative; width: 100%; height: 140px; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .item-number { position: absolute; bottom: 5px; left: 5px; background: rgba(0, 0, 0, 0.7); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; z-index: 5; }
        .card-info { padding: 10px; text-align: center; font-size: 0.9em; font-weight: bold; color: var(--gold); flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        .hot-tag { position: absolute; top: 5px; right: 5px; background: red; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 10; animation: pulse 1.5s infinite; }
        .card.hot-border { border: 1px solid var(--gold); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }

        #loadMoreBtn { margin: 30px 0; padding: 12px 30px; background: var(--gold); color: #000; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; display: none; transition: 0.3s; }

        /* כפתור חזרה למעלה */
        #backToTop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--gold);
            color: #000;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: 0.4s;
            z-index: 1000;
            border: none;
        }
        #backToTop.show { opacity: 1; visibility: visible; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        @media (max-width: 350px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>🎁 המבצעים החמים</h1>
    <input type="text" id="searchBar" placeholder="חפש מוצר..." onkeyup="filterItems()">
    
    <div class="categories" id="catMenu">
        <button class="cat-btn active" id="btn-all" onclick="filterCat('all', this)">הכל</button>
    </div>

    <div id="dealsContainer" class="container">טוען אוצרות...</div>
    <button id="loadMoreBtn" onclick="showMore()">טען עוד מוצרים...</button>

    <button id="backToTop" onclick="scrollToTop()">↑</button>

    <script>
        const sheetUrl = 'https://docs.google.com/spreadsheets/d/1GpZ2pGGM6Lb5MpCTXuW4Op2kJK_RkkNMHUUvyN1vyRQ/gviz/tq?tqx=out:csv';
        let allData = [];
        let filteredData = [];
        let visibleCount = 12;

        async function loadDeals() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const catMenu = document.getElementById('catMenu');
                const categories = new Set();
                
                let loadedItems = rows.map((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 3) {
                        const cat = (cols[3] || 'כללי').replace(/"/g, '').trim();
                        if (cat) categories.add(cat);
                        return {
                            id: index + 2,
                            name: cols[0].replace(/"/g, '').trim(),
                            link: cols[1].replace(/"/g, '').trim(),
                            img: cols[2].replace(/"/g, '').trim(),
                            cat: cat,
                            status: (cols[4] || '').replace(/"/g, '').trim()
                        };
                    }
                }).filter(Boolean);

                allData = loadedItems.reverse();
                filteredData = allData;

                categories.forEach(c => {
                    catMenu.innerHTML += `<button class="cat-btn" onclick="filterCat('${c}', this)">${c}</button>`;
                });

                renderItems();
            } catch (error) {
                document.getElementById('dealsContainer').innerHTML = 'שגיאה בטעינת הנתונים...';
            }
        }

        function renderItems() {
            const container = document.getElementById('dealsContainer');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            const itemsToShow = filteredData.slice(0, visibleCount);
            
            container.innerHTML = itemsToShow.map(item => `
                <a href="${item.link}" target="_blank" class="card ${item.status === 'HOT' ? 'hot-border' : ''}" data-cat="${item.cat}">
                    ${item.status === 'HOT' ? '<div class="hot-tag">🔥 HOT</div>' : ''}
                    <div class="img-wrapper">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="item-number">${item.id}</div>
                    </div>
                    <div class="card-info">${item.name}</div>
                </a>
            `).join('');

            if (visibleCount < filteredData.length) {
                loadMoreBtn.style.display = 'block';
            } else {
                loadMoreBtn.style.display = 'none';
            }
        }

        function showMore() {
            visibleCount += 12;
            renderItems();
        }

        function filterItems() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            filteredData = allData.filter(item => item.name.toLowerCase().includes(term));
            visibleCount = 12;
            renderItems();
        }

        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (cat === 'all') { filteredData = allData; } 
            else { filteredData = allData.filter(i => i.cat === cat); }
            visibleCount = 12;
            renderItems();
        }

        // פונקציות לכפתור חזרה למעלה
        window.onscroll = function() {
            const btn = document.getElementById("backToTop");
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                btn.classList.add("show");
            } else {
                btn.classList.remove("show");
            }
        };

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        loadDeals();
    </script>
</body>
</html>
