<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>דף הבית של שימי</title>
    <style>
        body { 
            background-color: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; scroll-behavior: smooth; overflow-x: hidden;
        }

        /* לוגו - נתיב ישיר ללא תיקייה */
        .header-logo {
            width: 100%; max-width: 500px;
            height: auto; max-height: 120px;
            object-fit: contain; margin: 10px 0 20px 0;
            display: block;
        }
        
        #altTitle { color: #ffff00; font-size: 26px; margin: 15px 0; text-align: center; width: 100%; }

        #searchBox {
            width: 90%; max-width: 480px; padding: 15px; margin-bottom: 25px;
            border-radius: 12px; border: 2px solid #444; background-color: #111;
            color: #fff; font-size: 18px; outline: none; text-align: center;
        }
        #searchBox:focus { border-color: #ffff00; }

        /* מרכוז הגריד */
        .links-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 12px; width: 100%; max-width: 500px; 
            justify-content: center;
        }
        
        .link-item { 
            display: flex; flex-direction: column; align-items: center; text-decoration: none; 
            background-color: #111; border: 2px solid #333; border-radius: 15px; padding: 12px 5px;
            transition: all 0.2s; min-height: 110px;
        }
        .link-item.hidden { display: none; }
        .link-item img { width: 45px; height: 45px; border-radius: 10px; margin-bottom: 8px; background: #fff; padding: 2px; object-fit: contain; }
        .link-item span { color: #ffff00; font-size: 12px; font-weight: bold; text-align: center; line-height: 1.2; }

        #loadMoreBtn {
            margin: 30px 0; padding: 15px 40px; background-color: #222; color: #ffff00;
            border: 2px solid #ffff00; border-radius: 30px; font-weight: bold; cursor: pointer;
        }

        /* כפתור חזרה למעלה - עבר לצד ימין */
        #backToTop {
            position: fixed; bottom: 30px; right: 30px;
            width: 55px; height: 55px; background-color: #ffff00; color: #000;
            border-radius: 50%; border: none; font-size: 28px; font-weight: bold;
            display: none; cursor: pointer; z-index: 1000;
        }

        footer { margin-top: auto; padding: 25px 0; color: #666; font-size: 13px; text-align: center; border-top: 1px solid #222; width: 100%; }
    </style>
</head>
<body>

    <img src="logo.png" alt="לוגו" class="header-logo" id="mainLogo" onerror="this.style.display='none'; document.getElementById('altTitle').style.display='block';">
    <h1 id="altTitle" style="display:none;">הקישורים של שימי</h1>

    <input type="text" id="searchBox" placeholder="חפש אתר..." onkeyup="filterLinks()">

    <div id="linksContainer" class="links-grid"></div>

    <button id="loadMoreBtn" style="display: none;" onclick="showAllLinks()">הצג את כל הקישורים</button>
    <button id="backToTop" onclick="window.scrollTo(0,0)">↑</button>

    <footer>
        &copy; 2026 דף הקישורים של שימי | כל הזכויות שמורות
    </footer>

    <script>
        const SHEET_ID = '1lS8jgBjOtzIC7zWdRWaHiuOjjXe7Cn6L9JlYgGZ6ZEE';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
        let allData = [];

        window.onscroll = function() {
            const btn = document.getElementById("backToTop");
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                btn.style.display = "block";
            } else {
                btn.style.display = "none";
            }
        };

        function getAutoIcon(url) {
            try { return `https://www.google.com/s2/favicons?sz=128&domain=${new URL(url).hostname}`; }
            catch (e) { return 'https://via.placeholder.com/128/333/ffff00?text=S'; }
        }

        function filterLinks() {
            const filter = document.getElementById('searchBox').value.toLowerCase();
            const items = document.querySelectorAll('.link-item');
            const loadMoreBtn = document.getElementById('loadMoreBtn');
            loadMoreBtn.style.display = filter.length > 0 ? "none" : (allData.length > 20 ? "block" : "none");
            items.forEach(item => {
                const text = item.querySelector('span').innerText.toLowerCase();
                item.style.display = text.includes(filter) ? "flex" : "none";
            });
        }

        function showAllLinks() {
            document.querySelectorAll('.link-item.hidden').forEach(item => item.classList.remove('hidden'));
            document.getElementById('loadMoreBtn').style.display = "none";
        }

        function renderLinks(rows) {
            const container = document.getElementById('linksContainer');
            container.innerHTML = '';
            rows.forEach((row, index) => {
                const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (columns.length >= 2) {
                    const name = columns[0].replace(/"/g, '').trim();
                    const url = columns[1].replace(/"/g, '').trim();
                    const icon = (columns[2] && columns[2].length > 5) ? columns[2].replace(/"/g, '').trim() : getAutoIcon(url);
                    if (name && url) {
                        const a = document.createElement('a');
                        a.href = url; a.className = 'link-item';
                        if (index >= 20) a.classList.add('hidden');
                        a.innerHTML = `<img src="${icon}" onerror="this.src='https://via.placeholder.com/128/333/ffff00?text=${name[0]}'"><span>${name}</span>`;
                        container.appendChild(a);
                    }
                }
            });
            document.getElementById('loadMoreBtn').style.display = rows.length > 20 ? "block" : "none";
        }

        async function fetchLinks() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                allData = data.split(/\r?\n/).slice(1).filter(row => row.trim() !== "");
                renderLinks(allData);
            } catch (error) { console.error('Error fetching links'); }
        }
        fetchLinks();
    </script>
</body>
</html>
