<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>דף הבית של שימי</title>
    <style>
        body { 
            background-color: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; 
        }
        h1 { color: #ffff00; font-size: 26px; margin: 20px 0; border-bottom: 3px solid #ffff00; padding-bottom: 5px; }
        
        .links-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); 
            gap: 15px; width: 100%; max-width: 500px; 
        }
        
        .link-item { 
            display: flex; flex-direction: column; align-items: center; text-decoration: none; 
            background-color: #111; border: 2px solid #333; border-radius: 15px; padding: 12px 5px;
            transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }

        .link-item:active { border-color: #ffff00; transform: scale(0.95); }

        .link-item img { width: 48px; height: 48px; border-radius: 10px; margin-bottom: 8px; background: #fff; padding: 2px; }
        .link-item span { 
            color: #ffff00; font-size: 13px; font-weight: bold; text-align: center; 
            line-height: 1.2; word-wrap: break-word; width: 100%;
        }
        
        .loading { color: #ffff00; font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>הקישורים שלי</h1>
    <div id="loading" class="loading">טוען קישורים מהאקסל...</div>
    <div id="linksContainer" class="links-grid"></div>

    <script>
        // להדביק כאן את הקישור שקיבלת מ-"פרסום באינטרנט" (CSV)
        const SHEET_CSV_URL = 'כאן_להדביק_את_הקישור_שלך';

        function getIcon(url) {
            try { return `https://www.google.com/s2/favicons?sz=128&domain=${new URL(url).hostname}`; }
            catch (e) { return 'https://via.placeholder.com/128/333/ffff00?text=S'; }
        }

        async function fetchLinks() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // דילוג על כותרות
                
                const container = document.getElementById('linksContainer');
                document.getElementById('loading').style.display = 'none';
                container.innerHTML = '';

                rows.forEach(row => {
                    const columns = row.split(',');
                    if (columns.length >= 2) {
                        const name = columns[0].trim();
                        const url = columns[1].trim();
                        
                        if (name && url) {
                            const a = document.createElement('a');
                            a.href = url;
                            a.className = 'link-item';
                            a.innerHTML = `<img src="${getIcon(url)}"><span>${name}</span>`;
                            container.appendChild(a);
                        }
                    }
                });
            } catch (error) {
                document.getElementById('loading').innerText = 'שגיאה בטעינת הנתונים';
                console.error(error);
            }
        }

        fetchLinks();
    </script>
</body>
</html>
