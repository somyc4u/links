<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף הבית של שימי</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; user-select: none; }
        h1 { color: #ffff00; font-size: 24px; margin: 15px 0; border-bottom: 2px solid #ffff00; }
        
        .links-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 100%; max-width: 600px; }
        
        .link-item { 
            display: flex; flex-direction: column; align-items: center; text-decoration: none; 
            background-color: #111; border: 2px solid #444; border-radius: 12px; padding: 10px 5px;
            -webkit-tap-highlight-color: transparent;
        }

        .link-item img { width: 45px; height: 45px; border-radius: 8px; margin-bottom: 5px; background: #fff; pointer-events: none; }
        .link-item span { color: #ffff00; font-size: 12px; font-weight: bold; text-align: center; pointer-events: none; }

        /* תפריט אפשרויות (Modal) */
        #contextMenu {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 3px solid #ffff00; border-radius: 20px; padding: 20px;
            z-index: 1000; width: 80%; max-width: 300px; box-shadow: 0 0 20px rgba(255,255,0,0.2);
        }
        .menu-btn { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
        .btn-edit { background: #ffff00; color: #000; }
        .btn-delete { background: #ff4444; color: #fff; }
        .btn-cancel { background: #444; color: #fff; }

        .admin-panel { margin-top: 30px; background-color: #080808; padding: 15px; border-radius: 12px; border: 1px dashed #ffff00; width: 90%; max-width: 400px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; background: #1a1a1a; border: 1px solid #ffff00; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button.add-btn { width: 100%; padding: 12px; background-color: #ffff00; color: #000; font-weight: bold; border: none; border-radius: 8px; font-size: 18px; }
        
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; }
    </style>
</head>
<body>

    <h1>הקישורים שלי</h1>

    <div id="linksContainer" class="links-grid"></div>

    <div class="admin-panel">
        <input type="text" id="nameInput" placeholder="שם האתר">
        <input type="text" id="urlInput" placeholder="כתובת (https://...)">
        <button class="add-btn" onclick="addNewLink()">הוסף למסך</button>
    </div>

    <div id="overlay"></div>
    <div id="contextMenu">
        <h3 style="color:#ffff00; text-align:center; margin-top:0;">אפשרויות קישור</h3>
        <button class="menu-btn btn-edit" onclick="editCurrent()">עריכה</button>
        <button class="menu-btn btn-delete" onclick="deleteCurrent()">מחיקה</button>
        <button class="menu-btn btn-cancel" onclick="closeMenu()">ביטול</button>
    </div>

    <script>
        let longPressTimer;
        let currentTargetIndex = null;

        function getIcon(url) {
            try { return `https://www.google.com/s2/favicons?sz=128&domain=${new URL(url).hostname}`; }
            catch (e) { return 'https://via.placeholder.com/128/333/ffff00?text=S'; }
        }

        function renderLinks() {
            const container = document.getElementById('linksContainer');
            let links = JSON.parse(localStorage.getItem('shimiLinks')) || [{name:'Google',url:'https://google.com'},{name:'YouTube',url:'https://youtube.com'}];
            localStorage.setItem('shimiLinks', JSON.stringify(links));
            
            container.innerHTML = '';
            links.forEach((item, index) => {
                const a = document.createElement('a');
                a.href = item.url;
                a.className = 'link-item';
                a.innerHTML = `<img src="${getIcon(item.url)}"><span>${item.name}</span>`;
                
                // טיפול בלחיצה ארוכה
                a.ontouchstart = (e) => {
                    longPressTimer = setTimeout(() => {
                        e.preventDefault();
                        showMenu(index);
                    }, 800);
                };
                a.ontouchend = () => clearTimeout(longPressTimer);
                a.onclick = (e) => { if(currentTargetIndex !== null) e.preventDefault(); };

                container.appendChild(a);
            });
        }

        function showMenu(index) {
            currentTargetIndex = index;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('contextMenu').style.display = 'block';
        }

        function closeMenu() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('contextMenu').style.display = 'none';
            currentTargetIndex = null;
        }

        function deleteCurrent() {
            if(currentTargetIndex === null) return;
            let links = JSON.parse(localStorage.getItem('shimiLinks'));
            links.splice(currentTargetIndex, 1);
            localStorage.setItem('shimiLinks', JSON.stringify(links));
            closeMenu();
            renderLinks();
        }

        function editCurrent() {
            let links = JSON.parse(localStorage.getItem('shimiLinks'));
            let item = links[currentTargetIndex];
            let newName = prompt("שם חדש:", item.name);
            let newUrl = prompt("כתובת חדשה:", item.url);
            if(newName && newUrl) {
                links[currentTargetIndex] = {name: newName, url: newUrl};
                localStorage.setItem('shimiLinks', JSON.stringify(links));
            }
            closeMenu();
            renderLinks();
        }

        function addNewLink() {
            const name = document.getElementById('nameInput').value;
            let url = document.getElementById('urlInput').value;
            if (!name || !url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            const links = JSON.parse(localStorage.getItem('shimiLinks')) || [];
            links.push({name, url});
            localStorage.setItem('shimiLinks', JSON.stringify(links));
            document.getElementById('nameInput').value = '';
            document.getElementById('urlInput').value = '';
            renderLinks();
        }

        renderLinks();
    </script>
</body>
</html>
