<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דף הבית של שימי</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffff00; /* צהוב בוהק לניגודיות מקסימלית */
            font-size: 32px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ffff00;
            padding-bottom: 10px;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        .link-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            background-color: #1a1a1a;
            border: 3px solid #444;
            border-radius: 20px;
            padding: 20px;
            transition: border-color 0.3s;
        }

        .link-item:active {
            border-color: #ffff00;
            background-color: #333;
        }

        .link-item img {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            margin-bottom: 12px;
            background-color: #fff; /* רקע לבן לאייקון שיבלוט על השחור */
            padding: 5px;
        }

        .link-item span {
            color: #ffff00;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
        }

        /* אזור הוספת קישורים */
        .admin-panel {
            margin-top: 50px;
            background-color: #111;
            padding: 20px;
            border-radius: 15px;
            border: 1px dashed #ffff00;
            width: 90%;
            max-width: 400px;
        }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: #222;
            border: 2px solid #555;
            color: #fff;
            font-size: 18px;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 18px;
            background-color: #ffff00;
            color: #000;
            font-weight: bold;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>הקישורים המהירים שלי</h1>

    <div id="linksContainer" class="links-grid">
        </div>

    <div class="admin-panel">
        <h2 style="color: #ffff00; font-size: 20px;">הוספת אתר חדש</h2>
        <input type="text" id="nameInput" placeholder="שם האתר (למשל: וואלה)">
        <input type="text" id="urlInput" placeholder="כתובת (https://...)">
        <button onclick="addNewLink()">הוסף למסך</button>
    </div>

    <script>
        // פונקציה להפקת אייקון מהדומיין
        function getIcon(url) {
            try {
                const domain = new URL(url).hostname;
                return `https://www.google.com/s2/favicons?sz=128&domain=${domain}`;
            } catch (e) {
                return 'https://via.placeholder.com/128/333/ffff00?text=Site';
            }
        }

        // טעינה מהזיכרון המקומי
        function renderLinks() {
            const container = document.getElementById('linksContainer');
            const links = JSON.parse(localStorage.getItem('shimiLinks')) || [
                {name: 'YouTube', url: 'https://youtube.com'},
                {name: 'Google', url: 'https://google.com'}
            ];
            
            container.innerHTML = '';
            links.forEach(item => {
                const card = document.createElement('a');
                card.href = item.url;
                card.className = 'link-item';
                card.innerHTML = `
                    <img src="${getIcon(item.url)}" alt="">
                    <span>${item.name}</span>
                `;
                container.appendChild(card);
            });
        }

        // הוספת קישור
        function addNewLink() {
            const name = document.getElementById('nameInput').value;
            let url = document.getElementById('urlInput').value;
            
            if (!name || !url) return;
            if (!url.startsWith('http')) url = 'https://' + url;

            const links = JSON.parse(localStorage.getItem('shimiLinks')) || [];
            links.push({name, url});
            localStorage.setItem('shimiLinks', JSON.stringify(links));
            
            document.getElementById('nameInput').value = '';
            document.getElementById('urlInput').value = '';
            renderLinks();
        }

        renderLinks();
    </script>
</body>
</html>
