<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="האתר הרשמי של אוצרות מהרשת! המציאות הכי שוות מאליאקספרס, מבצעים חמים, גאדג'טים, אופנה, לבית ולרכב. כל הלינקים והקופונים במקום אחד.">
    <meta name="keywords" content="אוצרות מהרשת, אליאקספרס, קניות ברשת, מבצעים, גאדג'טים, קופונים לאליאקספרס, מוצרים מומלצים, טיקטוק, מציאות, קניות באינטרנט, SomYc">
    <meta name="author" content="SomYc">
    
    <meta property="og:title" content="אוצרות מהרשת - SomYc">
    <meta property="og:description" content="המציאות הכי שוות מאליאקספרס! מבצעים חמים, גאדג'טים ומוצרים שווים. היכנסו ותתחילו לחסוך.">
    <meta property="og:image" content="https://somyc4u.github.io/links/banner.jpg">
    <meta property="og:url" content="https://somyc4u.github.io/links/">
    <meta property="og:type" content="website">

    <title>אוצרות מהרשת - SomYc</title>
    
    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #1a1a1a; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }

        .header-banner {
            width: 100%;
            max-width: 480px; 
            margin: 0 auto;
            background-color: #000;
            line-height: 0; 
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content-container {
            width: 100%;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .tagline {
            color: var(--gold);
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        /* ----- עיצוב שורת המוצרים המוקטנים החדשה ----- */
        .section-title {
            color: #fff;
            margin: 0 0 10px 0;
            font-size: 15px;
            font-weight: bold;
            text-align: right;
            width: 100%;
        }

        .deals-preview {
            width: 100%;
            display: flex;
            gap: 10px;
            overflow-x: auto; /* מאפשר גלילה הצידה */
            padding-bottom: 15px;
            margin-bottom: 15px;
            scrollbar-width: none; /* מסתיר את פס הגלילה למראה נקי */
        }
        .deals-preview::-webkit-scrollbar {
            display: none;
        }

        .mini-card {
            background: var(--card);
            border: 1px solid #333;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            color: white;
            position: relative;
            display: flex;
            flex-direction: column;
            flex: 0 0 90px; /* קיבוע הרוחב לקלף קטן */
        }
        .mini-img-wrapper {
            position: relative;
            width: 100%;
            height: 90px;
        }
        .mini-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .mini-card-info {
            padding: 5px;
            text-align: center;
            font-weight: bold;
            color: var(--gold);
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* מוסיף 3 נקודות אם הטקסט ארוך מדי */
            display: block;
        }
        
        .hot-tag-mini {
            position: absolute;
            top: 4px;
            right: 4px;
            background: red;
            color: white;
            padding: 2px 5px;
            border-radius: 8px;
            font-size: 9px;
            font-weight: bold;
            z-index: 10;
        }
        .hot-border { border: 1px solid var(--gold); }

        /* ----- עיצוב הכפתורים הרגיל ----- */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; 
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: start; 
            padding: 8px 20px; 
            border-radius: 50px; 
            text-decoration: none;
            color: #fff;
            font-size: 17px;
            font-weight: bold;
            background-color: #111; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.1);
            transition: all 0.3s ease;
        }

        .link-icon {
            height: 42px; 
            width: auto;
            margin-left: 15px; 
            display: block;
        }

        .link-btn:hover, .link-btn:active {
            transform: scale(0.97); 
            background-color: #222;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); 
        }

        .footer {
            margin-top: auto;
            color: #444;
            font-size: 12px;
            padding: 30px 0 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <img src="banner.png" alt="אוצרות מהרשת" class="banner-img">
    </div>

    <div class="content-container">
        <p class="tagline">המציאות הכי שוות מאליאקספרס ✨🔥</p>

        <div class="section-title">🔥 הלהיטים של היום:</div>
        <div id="dealsPreview" class="deals-preview">טוען מוצרים לוהטים...</div>

        <div class="links-container">
            <a href="deals.html" class="link-btn">
                <img src="deals.png" alt="המבצעים" class="link-icon">
                לכל המבצעים לחץ כאן 🔥
            </a>
            <a href="https://chat.whatsapp.com/GaRKX7NOUUWA1r4dg6Dtf3" target="_blank" class="link-btn">
                <img src="whatsapp.png" alt="וואטסאפ" class="link-icon">
                קבוצת העדכונים בוואטסאפ 💬
            </a>
            <a href="https://www.tiktok.com/@otzarot.mehareshet?_r=1&_t=ZS-94wkAgiSckh" target="_blank" class="link-btn">
                <img src="tiktok.png" alt="טיקטוק" class="link-icon">
                ערוץ הטיקטוק שלנו 🎵
            </a>
            <a href="https://www.instagram.com/somyc.x4u?igsh=MTBhYzEyNXduMnA5eg==" target="_blank" class="link-btn">
                <img src="instagram.png" alt="אינסטגרם" class="link-icon">
                ערוץ האינסטגרם שלנו 📷
            </a>
            <a href="https://www.facebook.com/share/1CTiAJTDop/" target="_blank" class="link-btn">
                <img src="facebook.png" alt="פייסבוק" class="link-icon">
                ערוץ הפייסבוק שלנו 📘
            </a>
        </div>

        <div class="footer">&copy; 2026 אוצרות מהרשת | SomYc</div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/1GpZ2pGGM6Lb5MpCTXuW4Op2kJK_RkkNMHUUvyN1vyRQ/gviz/tq?tqx=out:csv";
        
        async function loadTopDeals() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                let loadedItems = rows.map((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        name: (cols[0] || '').replace(/"/g, '').trim(),
                        link: (cols[1] || '').replace(/"/g, '').trim(),
                        img: (cols[2] || '').replace(/"/g, '').trim(),
                        status: (cols[4] || '').replace(/"/g, '').trim()
                    };
                }).filter(i => i.name && i.img);

                // נשלוף את 5 המוצרים המסומנים כ-HOT
                let topDeals = loadedItems.filter(i => i.status === 'HOT').reverse().slice(0, 5);
                
                // השלמה ל-5 מתוך השאר במידה ואין מספיק
                if(topDeals.length < 5) {
                    const others = loadedItems.filter(i => i.status !== 'HOT').reverse();
                    topDeals = [...topDeals, ...others].slice(0, 5 - topDeals.length);
                }

                const container = document.getElementById('dealsPreview');
                container.innerHTML = topDeals.map(item => 
                    `<a href="${item.link}" target="_blank" class="mini-card ${item.status === 'HOT' ? 'hot-border' : ''}">
                        ${item.status === 'HOT' ? '<div class="hot-tag-mini">🔥</div>' : ''}
                        <div class="mini-img-wrapper">
                            <img src="${item.img}" alt="${item.name}">
                        </div>
                        <div class="mini-card-info">${item.name}</div>
                    </a>`
                ).join('');
            } catch (error) {
                document.getElementById('dealsPreview').innerHTML = '<p style="text-align:center; width:100%;">שגיאה בטעינת הנתונים...</p>';
            }
        }

        loadTopDeals();
    </script>
</body>
</html>
