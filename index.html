<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אוצרות מהרשת - SomYc</title>
    <style>
        /* בסיס האתר - שחור יוקרתי */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }

        /* הבאנר הראשי למעלה - 100% רוחב */
        .header-banner {
            width: 100%;
            background-color: #000;
            line-height: 0; /* מונע רווח לבן מתחת לתמונה */
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* תוכן העמוד מתחת לבאנר */
        .content-container {
            width: 100%;
            max-width: 450px; /* ממרכז את הכפתורים למראה אלגנטי */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* כותרת משנה מוזהבת */
        .tagline {
            color: #FFD700;
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        /* מיכל הכפתורים החדש */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; /* רווח בין כפתור לכפתור */
        }

        /* עיצוב הכפתורים החדשים - יוקרתי ונקי */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: start; /* סמל בצד ימין, טקסט משמאל */
            padding: 8px 20px; 
            border-radius: 50px; /* צורת פיל */
            text-decoration: none;
            color: #fff;
            font-size: 17px;
            font-weight: bold;
            background-color: #111; /* רקע שחור עמוק */
            border: 2px solid #FFD700; /* מסגרת זהב בוהק */
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.1);
            transition: all 0.3s ease;
        }

        /* עיצוב האייקונים בתוך הכפתור */
        .link-icon {
            height: 42px; 
            width: auto;
            margin-left: 15px; /* רווח בין האייקון לטקסט */
            display: block;
        }

        /* אפקט מעבר עכבר/לחיצה - הילה והתכווצות */
        .link-btn:hover, .link-btn:active {
            transform: scale(0.97); /* מתכווץ קצת */
            background-color: #222;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); /* הילה מוזהבת */
        }

        /* פוטר פשוט */
        .footer {
            margin-top: auto;
            color: #444;
            font-size: 12px;
            padding: 30px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <img src="banner.png" alt="אוצרות מהרשת" class="banner-img">
    </div>

    <div class="content-container">
        <p class="tagline">המציאות הכי שוות מאליאקספרס ✨🔥</p>

        <div class="links-container">
            
            <a href="deals.html" class="link-btn">
                <img src="deals.png" alt="המבצעים" class="link-icon">
                לעמוד המבצעים הכי שווים 🔥
            </a>

            <a href="https://chat.whatsapp.com/GaRKX7NOUUWA1r4dg6Dtf3" target="_blank" class="link-btn">
                <img src="whatsapp.png" alt="וואטסאפ" class="link-icon">
                קבוצת העדכונים בוואטסאפ 💬
            </a>

            <a href="https://www.tiktok.com/@otzarot.mehareshet?_r=1&_t=ZS-94wkAgiSckh" target="_blank" class="link-btn">
                <img src="tiktok.png" alt="טיקטוק" class="link-icon">
                ערוץ הטיקטוק שלנו 🎵
            </a>

            <a href="https://www.instagram.com/somyc.x4u?igsh=MTBhYzEyNXduMnA5eg==" target="_blank" class="link-btn">
                <img src="instagram.png" alt="אינסטגרם" class="link-icon">
                ערוץ האינסטגרם שלנו 📷
            </a>

            <a href="https://www.facebook.com/share/1CTiAJTDop/" target="_blank" class="link-btn">
                <img src="facebook.png" alt="פייסבוק" class="link-icon">
                ערוץ הפייסבוק שלנו 📘
            </a>

        </div>

        <div class="footer">&copy; 2026 אוצרות מהרשת | SomYc</div>
    </div>

</body>
</html>
