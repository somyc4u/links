<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="description" content="האתר הרשמי של אוצרות מהרשת! המציאות הכי שוות מאליאקספרס, מבצעים חמים, גאדג'טים, אופנה, לבית ולרכב. כל הלינקים והקופונים במקום אחד.">
    <meta name="keywords" content="אוצרות מהרשת, אליאקספרס, קניות ברשת, מבצעים, גאדג'טים, קופונים לאליאקספרס, מוצרים מומלצים, טיקטוק, מציאות, קניות באינטרנט, SomYc">
    <meta name="author" content="SomYc">
    
    <meta property="og:title" content="אוצרות מהרשת - SomYc">
    <meta property="og:description" content="המציאות הכי שוות מאליאקספרס! מבצעים חמים, גאדג'טים ומוצרים שווים. היכנסו ותתחילו לחסוך.">
    <meta property="og:image" content="https://somyc4u.github.io/links/banner.jpg">
    <meta property="og:url" content="https://somyc4u.github.io/links/">
    <meta property="og:type" content="website">

    <title>אוצרות מהרשת - SomYc</title>
    
    <style>
        :root { --gold: #FFD700; --bg: #000; --card: #1a1a1a; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
            min-height: 100vh;
        }

        .header-banner {
            width: 100%;
            max-width: 480px; 
            margin: 0 auto;
            background-color: #000;
            line-height: 0; 
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content-container {
            width: 100%;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .tagline {
            color: var(--gold);
            margin-bottom: 30px;
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px; 
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: start; 
            padding: 8px 20px; 
            border-radius: 50px; 
            text-decoration: none;
            color: #fff;
            font-size: 17px;
            font-weight: bold;
            background-color: #111; 
            border: 2px solid var(--gold); 
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.1);
            transition: all 0.3s ease;
        }

        .link-icon {
            height: 42px; 
            width: auto;
            margin-left: 15px; 
            display: block;
        }

        .link-btn:hover, .link-btn:active {
            transform: scale(0.97); 
            background-color: #222;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); 
        }

        /* ----- תוספת חדשה: תצוגת מוצרים מובילים ----- */
        .section-title {
            color: var(--gold);
            margin: 40px 0 15px 0;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            width: 100%;
            text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
        }

        .deals-preview {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 10px;
        }

        .card { background: var(--card); border: 1px solid #333; border-radius: 12px; overflow: hidden; text-decoration: none; color: white; position: relative; display: flex; flex-direction: column; }
        .img-wrapper { position: relative; width: 100%; height: 160px; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 10px; text-align: center; font-weight: bold; color: var(--gold); font-size: 0.9em; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        
        .hot-tag { position: absolute; top: 5px; right: 5px; background: red; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; z-index: 10; }
        .hot-border { border: 1px solid var(--gold); }

        .more-deals-btn {
            background: var(--gold);
            color: #000;
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            text-decoration: none;
            margin-top: 15px;
            font-size: 15px;
        }

        .footer {
            margin-top: auto;
            color: #444;
            font-size: 12px;
            padding: 40px 0 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header-banner">
        <img src="banner.png" alt="אוצרות מהרשת" class="banner-img">
    </div>

    <div class="content-container">
        <p class="tagline">המציאות הכי שוות מאליאקספרס ✨🔥</p>

        <div class="links-container">
            <a href="deals.html" class="link-btn">
                <img src="deals.png" alt="המבצעים" class="link-icon">
                לעמוד המבצעים הכי שווים 🔥
            </a>
            <a href="https://chat.whatsapp.com/GaRKX7NOUUWA1r4dg6Dtf3" target="_blank" class="link-btn">
                <img src="whatsapp.png" alt="וואטסאפ" class="link-icon">
                קבוצת העדכונים בוואטסאפ 💬
            </a>
            <a href="https://www.tiktok.com/@otzarot.mehareshet?_r=1&_t=ZS-94wkAgiSckh" target="_blank" class="link-btn">
                <img src="tiktok.png" alt="טיקטוק" class="link-icon">
                ערוץ הטיקטוק שלנו 🎵
            </a>
            <a href="https://www.instagram.com/somyc.x4u?igsh=MTBhYzEyNXduMnA5eg==" target="_blank" class="link-btn">
                <img src="instagram.png" alt="אינסטגרם" class="link-icon">
                ערוץ האינסטגרם שלנו 📷
            </a>
            <a href="https://www.facebook.com/share/1CTiAJTDop/" target="_blank" class="link-btn">
                <img src="facebook.png" alt="פייסבוק" class="link-icon">
                ערוץ הפייסבוק שלנו 📘
            </a>
        </div>

        <div class="section-title">🔥 מובילים ברשת 🔥</div>
        <div id="dealsPreview" class="deals-preview">טוען מוצרים לוהטים...</div>
        <a href="deals.html" class="more-deals-btn">לכל המבצעים לחץ כאן...</a>

        <div class="footer">&copy; 2026 אוצרות מהרשת | SomYc</div>
    </div>

    <script>
        const sheetUrl = "https://docs.google.com/spreadsheets/d/1GpZ2pGGM6Lb5MpCTXuW4Op2kJK_RkkNMHUUvyN1vyRQ/gviz/tq?tqx=out:csv";
        
        async function loadTopDeals() {
            try {
                const response = await fetch(sheetUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                
                let loadedItems = rows.map((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    return {
                        name: (cols[0] || '').replace(/"/g, '').trim(),
                        link: (cols[1] || '').replace(/"/g, '').trim(),
                        img: (cols[2] || '').replace(/"/g, '').trim(),
                        status: (cols[4] || '').replace(/"/g, '').trim()
                    };
                }).filter(i => i.name && i.img);

                // ניקח את 4 המוצרים החדשים ביותר שסומנו כ-HOT
                let topDeals = loadedItems.filter(i => i.status === 'HOT').reverse().slice(0, 4);
                
                // אם אין 4 מוצרים מסומנים, נשלים מהמוצרים הרגילים
                if(topDeals.length < 4) {
                    const others = loadedItems.filter(i => i.status !== 'HOT').reverse();
                    topDeals = [...topDeals, ...others].slice(0, 4 - topDeals.length);
                }

                const container = document.getElementById('dealsPreview');
                container.innerHTML = topDeals.map(item => 
                    `<a href="${item.link}" target="_blank" class="card ${item.status === 'HOT' ? 'hot-border' : ''}">
                        ${item.status === 'HOT' ? '<div class="hot-tag">🔥 HOT</div>' : ''}
                        <div class="img-wrapper">
                            <img src="${item.img}" alt="${item.name}">
                        </div>
                        <div class="card-info">${item.name}</div>
                    </a>`
                ).join('');
            } catch (error) {
                document.getElementById('dealsPreview').innerHTML = '<p style="text-align:center; width:100%; grid-column:span 2;">שגיאה בטעינת הנתונים...</p>';
            }
        }

        loadTopDeals();
    </script>
</body>
</html>
