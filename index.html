<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>אוצרות מהרשת - דף הבית</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* הבאנר החדש - בומבסטי לכל הרוחב */
        .header-banner {
            width: 100%;
            background-color: #000;
            line-height: 0; /* מונע רווח לבן קטן מתחת לתמונה */
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
        }

        .content-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 50px 20px;
            box-sizing: border-box;
        }

        .tagline {
            color: #FFD700;
            margin-bottom: 40px;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .nav-container {
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            border: 1px solid transparent;
        }
        .btn-gold { background: linear-gradient(45deg, #FFD700, #B8860B); color: #000; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
        .btn-whatsapp { border-color: #25D366; color: #25D366; }
        .btn-tiktok { border-color: #fff; color: #fff; }
        .btn:hover { transform: scale(1.03); }

        .footer { margin-top: auto; color: #444; font-size: 12px; padding: 30px 0; }
    </style>
</head>
<body>

    <div class="header-banner">
        <img src="banner.png" alt="אוצרות מהרשת" class="banner-img">
    </div>

    <div class="content-container">
        <p class="tagline">המציאות הכי שוות מאליאקספרס ✨</p>

        <div class="nav-container">
            <a href="deals.html" class="btn btn-gold"><span>🔥</span> לכל המבצעים והמוצרים</a>
            <a href="https://chat.whatsapp.com/GaRKX7NOUUWA1r4dg6Dtf3" target="_blank" class="btn btn-whatsapp"><span>💬</span> קבוצת העדכונים בוואטסאפ</a>
            <a href="https://www.tiktok.com/@somyc4u" target="_blank" class="btn btn-tiktok"><span>🎵</span> ערוץ הטיקטוק הרשמי</a>
        </div>

        <div class="footer">&copy; 2026 אוצרות מהרשת | somyc4u</div>
    </div>

</body>
</html>
